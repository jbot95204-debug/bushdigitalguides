<section class="email-capture-section">
  <div class="container">
    <div class="email-capture-inner">
      <div class="section-label">FREE CHAPTER</div>
      <h2>Get a free chapter from our business guides</h2>
      <p>Plus weekly tips on local growth, enquiries, follow-up, and practical automation. No spam — just genuinely useful stuff.</p>
      <form action="https://formspree.io/f/xcontact" method="POST" class="email-capture-form">
        <div class="form-row">
          <div class="form-group">
            <input type="text" name="name" placeholder="Your name" required>
          </div>
          <div class="form-group">
            <input type="email" name="email" placeholder="your@email.com" required>
          </div>
          <div class="form-group">
            <select name="book_interest" required>
              <option value="">Which book interests you most?</option>
              <option value="Automate Everything">⚡ Automate Everything</option>
              <option value="AI for Tradies">🔧 AI for Tradies</option>
            </select>
          </div>
        </div>
        <input type="hidden" name="_subject" value="New lead magnet signup — Bush Digital Guides">
        <button type="submit" class="btn btn-accent" style="margin-top:8px;">Send Me a Free Chapter →</button>
      </form>
    </div>
  </div>
</section>
