<header class="site-header">
  <div class="container site-header-inner">
    <a href="/" class="site-logo" aria-label="Bush Digital Guides home">
      <span class="logo-stack">
        <span class="logo-line-1">Bush</span>
        <span class="logo-line-2">Digital Guides</span>
        <span class="logo-rule" aria-hidden="true"></span>
      </span>
    </a>
    <nav class="site-nav desktop-nav" aria-label="Primary">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL }}"{{ if or (eq .Name "Send an enquiry") (eq .Name "Contact") (eq .Name "Contact us") }} class="nav-cta"{{ end }}>{{ .Name }}</a>
      {{ end }}
    </nav>
    <button class="hamburger" id="menu-toggle" type="button" aria-label="Open menu" aria-controls="mobile-menu" aria-expanded="false">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
  </div>
</header>

<div class="mobile-menu" id="mobile-menu" hidden role="dialog" aria-modal="true" aria-label="Site menu">
  <div class="mobile-menu-top">
    <a href="/" class="site-logo" aria-label="Bush Digital Guides home">
      <span class="logo-stack">
        <span class="logo-line-1">Bush</span>
        <span class="logo-line-2">Digital Guides</span>
        <span class="logo-rule" aria-hidden="true"></span>
      </span>
    </a>
    <button class="mobile-menu-x" id="menu-close" type="button" aria-label="Close menu">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
  <nav class="mobile-menu-links" aria-label="Mobile">
    {{ range .Site.Menus.main }}
      <a href="{{ .URL }}"{{ if or (eq .Name "Send an enquiry") (eq .Name "Contact") (eq .Name "Contact us") }} class="nav-cta"{{ end }}>{{ .Name }}</a>
    {{ end }}
  </nav>
</div>

<script>
(function(){
  var toggle = document.getElementById('menu-toggle');
  var menu = document.getElementById('mobile-menu');
  var close = document.getElementById('menu-close');
  if (!toggle || !menu || !close) return;

  var lastFocus = null;
  var scrollPosition = 0;
  var savedBodyStyle = null;
  var FOCUSABLE = 'a[href], button:not([disabled]), textarea, input:not([disabled]), select:not([disabled]), [tabindex]:not([tabindex="-1"])';

  function isOpen(){
    return menu.classList.contains('is-open');
  }

  function getFocusable(){
    return Array.prototype.slice.call(menu.querySelectorAll(FOCUSABLE)).filter(function(el){
      return !el.hasAttribute('disabled') && el.getAttribute('aria-hidden') !== 'true';
    });
  }

  function setBackgroundInert(on){
    var nodes = document.querySelectorAll('header.site-header, main, footer, .site-footer');
    for (var i = 0; i < nodes.length; i++) {
      if (on) {
        nodes[i].setAttribute('inert', '');
        nodes[i].setAttribute('aria-hidden', 'true');
      } else {
        nodes[i].removeAttribute('inert');
        nodes[i].removeAttribute('aria-hidden');
      }
    }
  }

  function lockScroll(){
    scrollPosition = window.scrollY || window.pageYOffset || 0;
    savedBodyStyle = {
      overflow: document.body.style.overflow,
      position: document.body.style.position,
      top: document.body.style.top,
      width: document.body.style.width
    };
    document.documentElement.classList.add('menu-is-open');
    document.body.style.overflow = 'hidden';
    document.body.style.position = 'fixed';
    document.body.style.top = '-' + scrollPosition + 'px';
    document.body.style.width = '100%';
  }

  function unlockScroll(){
    if (savedBodyStyle) {
      document.body.style.overflow = savedBodyStyle.overflow;
      document.body.style.position = savedBodyStyle.position;
      document.body.style.top = savedBodyStyle.top;
      document.body.style.width = savedBodyStyle.width;
    }
    document.documentElement.classList.remove('menu-is-open');
    window.scrollTo(0, scrollPosition);
    savedBodyStyle = null;
  }

  function openMenu(){
    lastFocus = document.activeElement;
    menu.hidden = false;
    menu.classList.add('is-open');
    lockScroll();
    toggle.setAttribute('aria-expanded', 'true');
    toggle.setAttribute('aria-label', 'Close menu');
    setBackgroundInert(true);
    window.setTimeout(function(){
      close.focus();
    }, 0);
  }

  function closeMenu(restoreFocus){
    if (!isOpen()) return;
    menu.classList.remove('is-open');
    menu.hidden = true;
    unlockScroll();
    toggle.setAttribute('aria-expanded', 'false');
    toggle.setAttribute('aria-label', 'Open menu');
    setBackgroundInert(false);
    if (restoreFocus !== false) {
      var returnTo = lastFocus && typeof lastFocus.focus === 'function' ? lastFocus : toggle;
      returnTo.focus();
    }
    lastFocus = null;
  }

  toggle.addEventListener('click', function(){
    if (isOpen()) closeMenu();
    else openMenu();
  });
  close.addEventListener('click', function(){ closeMenu(true); });

  function focusHashDestination(hash){
    if (!hash) return;
    var target;
    try {
      target = document.querySelector(hash);
    } catch (error) {
      return;
    }
    if (!target) return;
    var destination = target.querySelector('h1, h2, h3, h4, [tabindex]') || target;
    if (!destination.hasAttribute('tabindex')) destination.setAttribute('tabindex', '-1');
    destination.focus({ preventScroll: true });
  }

  menu.querySelectorAll('.mobile-menu-links a').forEach(function(a){
    a.addEventListener('click', function(event){
      var destination = new URL(a.href, window.location.href);
      var isSamePageHash = destination.pathname === window.location.pathname && destination.hash;
      if (isSamePageHash) event.preventDefault();
      closeMenu(false);
      if (isSamePageHash) {
        window.setTimeout(function(){
          if (window.history && window.history.pushState) {
            window.history.pushState(null, '', destination.hash);
          } else {
            window.location.hash = destination.hash;
          }
          var target;
          try { target = document.querySelector(destination.hash); } catch (error) { return; }
          if (target) target.scrollIntoView({ block: 'start' });
          focusHashDestination(destination.hash);
        }, 0);
      } else {
        toggle.focus();
      }
    });
  });

  document.addEventListener('keydown', function(event){
    if (!isOpen()) return;

    if (event.key === 'Escape') {
      event.preventDefault();
      closeMenu(true);
      return;
    }

    if (event.key !== 'Tab') return;

    var focusable = getFocusable();
    if (!focusable.length) {
      event.preventDefault();
      return;
    }

    var first = focusable[0];
    var last = focusable[focusable.length - 1];
    var active = document.activeElement;

    if (event.shiftKey) {
      if (active === first || !menu.contains(active)) {
        event.preventDefault();
        last.focus();
      }
    } else if (active === last || !menu.contains(active)) {
      event.preventDefault();
      first.focus();
    }
  });

  window.addEventListener('resize', function(){
    if (window.innerWidth > 900 && isOpen()) closeMenu(true);
  });
})();
</script>
