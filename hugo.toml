enableRobotsTXT = false

[sitemap]
  changefreq = 'weekly'
  priority = 0.5

[outputs]
  home = ["HTML", "RSS"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[related]
  includeNewer = true
  threshold = 50
  toLower = true
  [[related.indices]]
    name = "tags"
    weight = 80
  [[related.indices]]
    name = "book"
    weight = 60
  [[related.indices]]
    name = "date"
    weight = 10
