[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "Services"
    url = "/consulting/"
    weight = 2
  [[menu.main]]
    name = "AI Search"
    url = "/ai-search-readiness/"
    weight = 3
  [[menu.main]]
    name = "Free Review"
